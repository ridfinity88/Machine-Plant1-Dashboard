<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personnel Monitoring Dashboard Pro (A1-A2 Side-by-Side)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --bg-color: #000;
            --card-gray: #424242;
            --card-green: #2e7d32;
            --card-red: #c62828;
            --card-yellow: #fbc02d;
            --text-color: #fff;
            --accent-blue: #2196F3;
        }
        * { box-sizing: border-box; }
        html, body { background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; margin: 0; padding: 10px; width: 100vw; height: 100vh; overflow: hidden; position: relative; }
        
        .main-title { position: absolute; top: 5px; left: 50%; transform: translateX(-50%); font-size: 1.4rem; font-weight: bold; color: #ccc; z-index: 5; text-transform: uppercase; letter-spacing: 2px; }
        .watermark { position: absolute; top: 15px; right: 20px; font-size: 0.8rem; color: rgba(255, 255, 255, 0.3); z-index: 10; pointer-events: none; letter-spacing: 3px; }
        .live-clock { position: absolute; top: 10px; left: 15px; z-index: 10; background: #444; color: #ccc; border: 1px solid #555; padding: 5px 10px; font-size: 0.8rem; }

        /* ============================================================
           Layout Management: แบ่งช่องแนวตั้ง (ซ้าย-ขวา) สำหรับ A1 และ A2
           ============================================================ */
        .dashboard { 
            display: grid; 
            width: 100%; 
            height: calc(100vh - 65px);
            margin-top: 50px;
            gap: 10px; 
            /* เพิ่มจำนวน column เป็น 8 เพื่อให้แบ่งครึ่งช่อง g14 และ g15 ได้สวยงาม */
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(3, 1fr);
            
            grid-template-areas: 
                "g1 g1 g1 g2 g3 g4 g4 g4"
                "g5 g5 g6 g7 g8 g9 g9 g9"
                "g10 g11 g12 g13 g14 a1 g15 a2"; /* แบ่งช่อง g14 กับ a1 และ g15 กับ a2 ไว้ข้างกัน */
        }

        /* ผูก ID กลุ่มเข้ากับ Grid Area */
        #container-1 { grid-area: g1; }
        #container-2 { grid-area: g2; }
        #container-3 { grid-area: g3; }
        #container-4 { grid-area: g4; }
        #container-5 { grid-area: g5; }
        #container-6 { grid-area: g6; }
        #container-7 { grid-area: g7; }
        #container-8 { grid-area: g8; }
        #container-9 { grid-area: g9; }
        #container-10 { grid-area: g10; }
        #container-11 { grid-area: g11; }
        #container-12 { grid-area: g12; }
        #container-13 { grid-area: g13; }
        
        /* ช่องที่แบ่งครึ่งแนวตั้ง (อยู่ข้างกัน) */
        #container-14 { grid-area: g14; } /* ห้องกล่อง */
        #container-16 { grid-area: a1; }  /* A1 (ขวาของห้องกล่อง) */
        #container-15 { grid-area: g15; } /* ห้องเบอร์เกอร์ */
        #container-17 { grid-area: a2; }  /* A2 (ขวาของห้องเบอร์เกอร์) */

        /* ============================================================ */

        .group-container { border: 1px solid #333; background: #1a1a1a; padding: 5px; display: flex; flex-direction: column; border-radius: 4px; overflow: hidden; }
        .group-header { font-size: 0.75rem; font-weight: bold; margin-bottom: 5px; border-bottom: 1px solid #444; padding-bottom: 2px; color: #aaa; text-align: center; white-space: nowrap; }
        
        .group-content { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); /* ปรับให้เหมาะสมกับช่องที่แคบลง */
            grid-auto-rows: minmax(32px, auto); 
            gap: 3px; 
            flex-grow: 1; 
            align-content: start; 
            overflow-y: auto; 
        }

        .block { 
            background-color: var(--card-gray); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 0.6rem; 
            cursor: grab; 
            text-align: center; 
            padding: 2px; 
            border-radius: 2px; 
            user-select: none; 
            grid-column: span 2; 
            min-height: 32px; 
        }

        .block.leader { 
            grid-column: span 2; 
            grid-row: span 2; 
            font-size: 0.75rem; 
            font-weight: bold; 
            min-height: 68px; 
        }

        .status-green { background-color: var(--card-green) !important; color: white; }
        .status-red { background-color: var(--card-red) !important; color: white; }
        .status-yellow { background-color: var(--card-yellow) !important; color: #000 !important; }
        .status-unknown { background-color: #fff !important; color: #000 !important; }

        #authOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 100; }
        .modal { background: #222; padding: 20px; border-radius: 8px; width: 320px; border: 1px solid #444; }
        .btn-action { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--accent-blue); color: white; }
        input[type="password"] { width: 100%; padding: 10px; margin: 10px 0; background: #333; border: 1px solid #555; color: white; text-align: center; }
    </style>
</head>
<body>

<div class="main-title">Machine Plant1 Dashboard</div>
<div class="watermark">Created By RiDFinity</div>
<div class="live-clock" id="liveClock">กำลังโหลด...</div>

<div class="dashboard" id="dashboard"></div>

<div id="authOverlay">
    <div class="modal">
        <h3 style="text-align: center;">กรุณาใส่รหัสผ่าน</h3>
        <input type="password" id="mainPass" oninput="checkAuthBtn(this, 'authBtn')">
        <button id="authBtn" class="btn-action btn-blue" style="display:none;" onclick="unlockApp()">เข้าสู่ระบบ</button>
    </div>
</div>

<script>
    const MASTER_KEY = "cpram2026";
    const totalGroups = 17;
    const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbxnJHrkUy5YuQ7rk37Dm0aT9nhlx4CuLn0g2y0NmRW6i9yPwJLZJXSJqB0UvFPUvQu1vA/exec";

    const FIXED_GROUP_NAMES = { 
        1: "ห้องส่งออก", 2: "ห้องหุงข้าว", 3: "PACK B", 4: "COOK1&3", 
        5: "PACK A", 6: "ห้องย่างไก่", 7: "COOK2", 8: "ห้องล้าง สุก&ดิบ", 
        9: "ห้องผสมไส้", 10: "ห้องเนื้อ", 11: "ห้องผัก", 12: "SEASONING", 
        13: "READY MEAL", 14: "ห้องกล่อง", 15: "ห้องเบอร์เกอร์",
        16: "A1", 17: "A2" 
    };

    let rawSheetData = [];

    async function loadSheetData() {
        try {
            const response = await fetch(SHEET_API_URL);
            rawSheetData = await response.json();
            renderDashboard();
        } catch (error) {
            console.error("Fetch Error:", error);
        }
    }

    function renderDashboard() {
        const container = document.getElementById('dashboard');
        container.innerHTML = '';
        const groupContents = {};
        for (let i = 1; i <= totalGroups; i++) groupContents[i] = [];

        rawSheetData.forEach(item => {
            let assignedGroupName = (item.latestGroup || item.initialGroup || "").trim();
            let groupId = findGroupIdByName(assignedGroupName);
            if (groupId) {
                groupContents[groupId].push(item);
            } else {
                item.isUnknownGroup = true;
                groupContents[1].push(item); 
            }
        });

        for (let g = 1; g <= totalGroups; g++) {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'group-container';
            groupDiv.id = `container-${g}`;
            groupDiv.innerHTML = `<div class="group-header">${FIXED_GROUP_NAMES[g]}</div>`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'group-content';
            contentDiv.id = `group-${g}`;
            contentDiv.dataset.name = FIXED_GROUP_NAMES[g];

            groupContents[g].forEach(item => {
                contentDiv.appendChild(createBlock(item));
            });

            groupDiv.appendChild(contentDiv);
            container.appendChild(groupDiv);

            new Sortable(contentDiv, {
                group: 'shared',
                animation: 150,
                onEnd: async (evt) => {
                    const itemEl = evt.item;
                    const newGroupName = evt.to.dataset.name;
                    const rowIndex = itemEl.dataset.rowindex;
                    await updateLatestGroupInSheet(rowIndex, newGroupName);
                    const itemData = rawSheetData.find(d => d.id === itemEl.id);
                    if(itemData) {
                        itemData.isUnknownGroup = false; 
                        applyColor(itemEl, itemData);
                    }
                }
            });
        }
    }

    function findGroupIdByName(name) {
        for (let id in FIXED_GROUP_NAMES) {
            if (FIXED_GROUP_NAMES[id] === name) return id;
        }
        return null;
    }

    async function updateLatestGroupInSheet(rowIndex, newGroupName) {
        try {
            await fetch(SHEET_API_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ rowIndex: rowIndex, newGroupName: newGroupName })
            });
        } catch (e) { console.error(e); }
    }

    function createBlock(item) {
        const div = document.createElement('div');
        div.className = `block ${item.isLeader ? 'leader' : ''}`;
        div.id = item.id;
        div.dataset.rowindex = item.rowIndex;
        div.innerText = item.name;
        applyColor(div, item);
        return div;
    }

    function applyColor(el, item) {
        el.classList.remove('status-green', 'status-red', 'status-yellow', 'status-unknown');
        if (item.isUnknownGroup) { el.classList.add('status-unknown'); return; }
        const s = item.status;
        if (s === 0 || s === "0") el.classList.add('status-green');
        else if (s === 1 || s === "1") el.classList.add('status-yellow');
        else if (s === 2 || s === "2") el.classList.add('status-red');
    }

    function checkAuthBtn(input, btnId) { document.getElementById(btnId).style.display = input.value.length > 0 ? 'block' : 'none'; }
    function unlockApp() {
        if (document.getElementById('mainPass').value === MASTER_KEY) {
            sessionStorage.setItem('isLoggedIn', 'true');
            document.getElementById('authOverlay').style.display = 'none';
        } else alert('รหัสผ่านไม่ถูกต้อง');
    }

    window.onload = () => {
        if (sessionStorage.getItem('isLoggedIn') !== 'true') document.getElementById('authOverlay').style.display = 'flex';
        loadSheetData();
        setInterval(() => { document.getElementById('liveClock').innerText = new Date().toLocaleString('th-TH'); }, 1000);
    };
</script>
</body>
</html>
