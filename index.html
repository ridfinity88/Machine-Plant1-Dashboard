<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personnel Monitoring Dashboard (Order Memory)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --dashboard-gap: 8px;
            --block-height: 35px;       
            --leader-height: 74px;
            --bg-color: #000;
            --card-gray: #424242;
            --card-green: #2e7d32;
            --card-red: #c62828;
            --card-yellow: #fbc02d;
            --text-color: #fff;
            --accent-blue: #2196F3;
        }

        * { box-sizing: border-box; }
        html, body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden; 
        }
        
        .main-title { position: absolute; top: 5px; left: 50%; transform: translateX(-50%); font-size: 1.1rem; font-weight: bold; color: #ccc; z-index: 5; text-transform: uppercase; }
        
        .header-info { position: absolute; top: 5px; left: 10px; z-index: 10; display: flex; gap: 5px; align-items: center; }
        .live-clock { background: #333; padding: 4px 8px; font-size: 0.7rem; border-radius: 4px; }
        #syncStatus { font-size: 0.9rem; }
        
        .spin { animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .watermark { position: absolute; top: 25px; left: 10px; font-size: 0.6rem; color: rgba(255, 255, 255, 0.2); }

        .dashboard { 
            display: grid; width: 100vw; height: 100vh;
            padding: 40px 10px 10px 10px;
            gap: var(--dashboard-gap);
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: 310px 310px 280fr; 
            grid-template-areas: 
                "g1 g1 g2 g2 g3 g3 g4 g5"
                "g1 g1 g2 g2 g3 g3 g6 g7"
                "g8 g9 g10 g11 g12 g13 g14 g15";
        }

        #container-1 { grid-area: g1; } #container-2 { grid-area: g2; } #container-3 { grid-area: g3; }
        #container-4 { grid-area: g4; } #container-5 { grid-area: g5; } #container-6 { grid-area: g6; }
        #container-7 { grid-area: g7; } #container-8 { grid-area: g8; } #container-9 { grid-area: g9; }
        #container-10 { grid-area: g10; } #container-11 { grid-area: g11; } #container-12 { grid-area: g12; }
        #container-13 { grid-area: g13; } #container-14 { grid-area: g14; } #container-15 { grid-area: g15; }

        .group-container { border: 1px solid #333; background: #111; padding: 6px; display: flex; flex-direction: column; border-radius: 4px; overflow: hidden; }
        .group-header { font-size: 0.7rem; font-weight: bold; margin-bottom: 6px; border-bottom: 1px solid #222; padding-bottom: 4px; color: #aaa; text-align: center; }
        .group-content { display: grid; grid-auto-rows: var(--block-height); gap: 4px; flex-grow: 1; align-content: start; overflow-y: auto; }

        .group-content.small-group { grid-template-columns: repeat(4, 1fr); }
        .group-content.large-group { grid-template-columns: repeat(8, 1fr); }
        
        .block { 
            background-color: var(--card-gray); display: flex; align-items: center; justify-content: center; 
            font-size: 0.52rem; cursor: pointer; padding: 2px; border-radius: 3px; height: var(--block-height);
            text-align: center; line-height: 1.1; transition: transform 0.1s, background-color 0.5s ease;
            user-select: none;
        }
        .block:active { transform: scale(0.95); }
        .block.leader { grid-column: span 2; grid-row: span 2; height: var(--leader-height); font-size: 0.6rem; font-weight: bold; border: 1px solid rgba(255,255,255,0.3); }

        .status-green { background-color: var(--card-green) !important; }
        .status-red { background-color: var(--card-red) !important; }
        .status-yellow { background-color: var(--card-yellow) !important; color: #000 !important; }
        .status-unknown { background-color: #fff !important; color: #000 !important; }

        /* Overlay & Modals */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); justify-content: center; align-items: center; z-index: 100; }
        .modal { background: #222; padding: 30px; border-radius: 12px; width: 350px; text-align: center; border: 1px solid #444; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        
        /* สไตล์ Input และปุ่มดวงตา */
        .input-group { position: relative; width: 100%; margin: 15px 0; }
        input[type="password"], input[type="text"] { width: 100%; padding: 12px 45px 12px 12px; background: #333; border: 1px solid #555; color: white; text-align: center; border-radius: 4px; outline: none; }
        
        .eye-btn { 
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%); 
            background: none; border: none; cursor: pointer; color: #aaa; font-size: 1.2rem;
            line-height: 1; padding: 5px;
        }

        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; background: var(--accent-blue); color: white; transition: 0.2s; margin-bottom: 10px; }
        .btn-action:hover { background: #1976D2; transform: translateY(-2px); }
        .btn-close { background: #444; color: #ccc; font-size: 0.8rem; padding: 8px; border: none; width: 100%; border-radius: 4px; cursor: pointer; }
        
        /* สไตล์กล่องข้อมูลคอลัมน์ C ใน Pop-up */
        .popup-detail { font-size: 0.95rem; color: #bbb; margin-top: 5px; margin-bottom: 25px; font-weight: normal; word-break: break-word; }
    </style>
</head>
<body>

<div class="main-title">Machine Plant1 Dashboard</div>
<div class="header-info">
    <div class="live-clock" id="liveClock">00/00/0000 00:00:00</div>
    <div id="syncStatus">✅</div>
</div>
<div class="watermark">RiDFinity Design</div>

<div class="dashboard" id="dashboard"></div>

<div id="authOverlay" class="overlay">
    <div class="modal">
        <h3 style="margin-top:0;">Access Required</h3>
        <div class="input-group">
            <input type="password" id="passInput" placeholder="Enter Password" onkeypress="handleEnter(event)">
            <button type="button" class="eye-btn" onclick="togglePass()">
                <span id="eyeIcon">👁️</span>
            </button>
        </div>
        <button class="btn-action" onclick="unlockApp()">LOGIN</button>
    </div>
</div>

<div id="infoOverlay" class="overlay" onclick="closeInfo()">
    <div class="modal" onclick="event.stopPropagation()">
        <h2 id="popupName" style="margin-bottom: 5px;">Name</h2>
        <!-- ส่วนที่เพิ่ม: แสดงข้อมูลคอลัมน์ C ใต้ชื่อรายชื่อ -->
        <div id="popupDetail" class="popup-detail">Detail</div>
        <button id="dashboardBtn" class="btn-action" onclick="goToDashboard()">Dashboard</button>
        <button class="btn-close" onclick="closeInfo()">CLOSE</button>
    </div>
</div>

<script>
    const MASTER_KEY = "cpram2026";
    const totalGroups = 15;
    const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbz2TRWNs-SFwz3J0PgkptYR_0u5obxarADK_iirwBupnvLIGN1mV3dpVBvXM4f5PKznzg/exec";

    const FIXED_GROUP_NAMES = { 
        1: "ห้องส่งออก", 2: "PACK A", 3: "PACK B", 4: "ห้องย่างไก่", 
        5: "ห้องหุงข้าว", 6: "COOK1&3", 7: "COOK2", 8: "READY MEAL", 
        9: "ห้องเบอร์เกอร์", 10: "ห้องกล่อง", 11: "ห้องเนื้อ", 12: "ห้องผัก", 
        13: "SEASONING", 14: "ห้องล้าง สุก&ดิบ", 15: "Overhaul"
    };

    let rawSheetData = [];
    let isInitialLoad = true;

    // --- ฟังก์ชันเปิด-ปิดดูรหัสผ่าน ---
    function togglePass() {
        const input = document.getElementById('passInput');
        const icon = document.getElementById('eyeIcon');
        if (input.type === "password") {
            input.type = "text";
            icon.innerText = "🙈"; 
        } else {
            input.type = "password";
            icon.innerText = "👁️"; 
        }
    }

    function handleEnter(e) { if (e.key === 'Enter') unlockApp(); }
    
    function unlockApp() {
        const pass = document.getElementById('passInput').value;
        if (pass === MASTER_KEY) {
            sessionStorage.setItem('isLoggedIn', 'true');
            document.getElementById('authOverlay').style.display = 'none';
        } else {
            alert('Password Incorrect');
            document.getElementById('passInput').value = '';
        }
    }

    // --- POPUP & REDIRECT ---
    function openPopup(item) {
        document.getElementById('popupName').innerText = item.name;
        // ใส่ข้อมูล Column C ลงใน Pop-up หากไม่มีข้อมูลจะใส่เครื่องหมาย - แทน
        document.getElementById('popupDetail').innerText = item.columnC ? item.columnC : "-";
        document.getElementById('dashboardBtn').innerText = `${item.name} Dashboard`;
        document.getElementById('infoOverlay').style.display = 'flex';
    }

    function closeInfo() { document.getElementById('infoOverlay').style.display = 'none'; }
    
    function goToDashboard() {
        window.location.href = "dashboard afo/index.html";
    }

    // --- DATA HANDLING ---
    async function loadSheetData() {
        const statusEl = document.getElementById('syncStatus');
        statusEl.innerHTML = '<span class="spin">⚙️</span>';
        try {
            const response = await fetch(`${SHEET_API_URL}?t=${new Date().getTime()}`);
            rawSheetData = await response.json();
            if (isInitialLoad) { renderDashboard(); isInitialLoad = false; } 
            else { updateColorsAndDataOnly(); }
            statusEl.innerHTML = '✅';
        } catch (error) { 
            console.error(error); 
            statusEl.innerHTML = '❌';
        }
    }

    function updateColorsAndDataOnly() {
        rawSheetData.forEach(item => {
            const block = document.getElementById(item.id);
            if (block) {
                block.innerText = item.name;
                applyColor(block, item);
                // อัปเดตข้อมูลก้อน Object ฝั่งคลิกเปิด Pop-up ให้เป็นข้อมูลใหม่ด้วย
                block.onclick = () => openPopup(item);
            }
        });
    }

    function renderDashboard() {
        const container = document.getElementById('dashboard');
        container.innerHTML = '';
        const groupContents = {};
        for (let i = 1; i <= totalGroups; i++) groupContents[i] = [];

        rawSheetData.forEach(item => {
            let assignedGroupName = (item.latestGroup || item.initialGroup || "").trim();
            let groupId = findGroupIdByName(assignedGroupName);
            if (groupId) groupContents[groupId].push(item);
            else { item.isUnknownGroup = true; groupContents[1].push(item); }
        });

        const savedOrder = JSON.parse(localStorage.getItem('dashboard_order_v1') || '{}');

        for (let g = 1; g <= totalGroups; g++) {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'group-container';
            groupDiv.id = `container-${g}`;
            groupDiv.innerHTML = `<div class="group-header">${FIXED_GROUP_NAMES[g]}</div>`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = `group-content ${g <= 3 ? 'large-group' : 'small-group'}`;
            contentDiv.id = `group-${g}`;
            contentDiv.dataset.name = FIXED_GROUP_NAMES[g];

            let itemsInGroup = groupContents[g];
            let groupOrder = savedOrder[g] || [];
            itemsInGroup.sort((a, b) => (groupOrder.indexOf(String(a.id)) === -1 ? 999 : groupOrder.indexOf(String(a.id))) - (groupOrder.indexOf(String(b.id)) === -1 ? 999 : groupOrder.indexOf(String(b.id))));

            itemsInGroup.forEach(item => contentDiv.appendChild(createBlock(item)));
            groupDiv.appendChild(contentDiv);
            container.appendChild(groupDiv);

            new Sortable(contentDiv, {
                group: 'shared',
                animation: 150,
                onEnd: async (evt) => {
                    const itemEl = evt.item;
                    const newGroupName = evt.to.dataset.name;
                    document.getElementById('syncStatus').innerHTML = '<span class="spin">⚙️</span>';
                    await updateLatestGroupInSheet(itemEl.dataset.rowindex, newGroupName);
                    saveAllGroupsOrder();
                    const itemData = rawSheetData.find(d => d.id === itemEl.id);
                    if(itemData) { 
                        itemData.isUnknownGroup = false; 
                        itemData.latestGroup = newGroupName; // อัปเดตกลุ่มล่าสุดในหน่วยความจำชั่วคราวด้วย
                        applyColor(itemEl, itemData); 
                    }
                    document.getElementById('syncStatus').innerHTML = '✅';
                }
            });
        }
    }

    function createBlock(item) {
        const div = document.createElement('div');
        div.className = `block ${item.isLeader ? 'leader' : ''}`;
        div.id = item.id;
        div.dataset.rowindex = item.rowIndex;
        div.innerText = item.name;
        applyColor(div, item);
        div.onclick = () => openPopup(item); 
        return div;
    }

    function applyColor(el, item) {
        el.classList.remove('status-green', 'status-red', 'status-yellow', 'status-unknown');
        if (item.isUnknownGroup) { el.classList.add('status-unknown'); return; }
        const s = item.status;
        if (s === 0 || s === "0") el.classList.add('status-green');
        else if (s === 1 || s === "1") el.classList.add('status-yellow');
        else if (s === 2 || s === "2") el.classList.add('status-red');
    }

    function findGroupIdByName(name) {
        for (let id in FIXED_GROUP_NAMES) if (FIXED_GROUP_NAMES[id] === name) return id;
        return null;
    }

    async function updateLatestGroupInSheet(rowIndex, newGroupName) {
        try { await fetch(SHEET_API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ rowIndex, newGroupName }) }); } 
        catch (e) { console.error(e); }
    }

    function saveAllGroupsOrder() {
        const orderData = {};
        for (let g = 1; g <= totalGroups; g++) {
            const el = document.getElementById(`group-${g}`);
            if (el) orderData[g] = Array.from(el.children).map(child => child.id);
        }
        localStorage.setItem('dashboard_order_v1', JSON.stringify(orderData));
    }

    window.onload = () => {
        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            document.getElementById('authOverlay').style.display = 'flex';
            document.getElementById('passInput').focus();
        }
        loadSheetData();
        setInterval(() => { 
            const now = new Date();
            document.getElementById('liveClock').innerText = `${now.toLocaleDateString('en-GB')} ${now.toLocaleTimeString('th-TH')}`; 
        }, 1000);
        setInterval(loadSheetData, 57000);
    };
</script>
</body>
</html>
