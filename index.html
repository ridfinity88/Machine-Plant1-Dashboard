<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personnel Monitoring Dashboard Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --bg-color: #000;
            --card-gray: #424242;
            --card-green: #2e7d32;
            --card-red: #c62828;
            --card-yellow: #fbc02d;
            --text-color: #fff;
            --accent-blue: #2196F3;
        }
        * { box-sizing: border-box; }
        html, body { background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; margin: 0; padding: 10px; width: 100vw; height: 100vh; overflow: hidden; position: relative; }
        .main-title { position: absolute; top: 5px; left: 50%; transform: translateX(-50%); font-size: 1.4rem; font-weight: bold; color: #ccc; z-index: 5; text-transform: uppercase; letter-spacing: 2px; }
        .watermark { position: absolute; top: 15px; right: 20px; font-size: 0.8rem; color: rgba(255, 255, 255, 0.3); z-index: 10; pointer-events: none; letter-spacing: 3px; }
        .live-clock { position: absolute; top: 10px; left: 15px; z-index: 10; background: #444; color: #ccc; border: 1px solid #555; padding: 5px 10px; font-size: 0.8rem; }
        .dashboard { display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(3, 30.5vh); gap: 10px; width: 100%; margin-top: 40px; }
        .group-container { border: 1px solid #333; background: #1a1a1a; padding: 5px; display: flex; flex-direction: column; border-radius: 4px; position: relative; }
        .group-header { font-size: 0.75rem; font-weight: bold; margin-bottom: 5px; border-bottom: 1px solid #333; padding-bottom: 2px; color: #aaa; display: flex; justify-content: center; align-items: center; text-transform: uppercase; }
        .group-content { display: grid; grid-template-columns: repeat(4, 1fr); grid-auto-rows: minmax(30px, auto); gap: 3px; flex-grow: 1; align-content: start; min-height: 80px; overflow-y: auto; }
        .sortable-ghost { opacity: 0.2; background: var(--accent-blue) !important; }
        .sortable-chosen { border: 1px solid var(--accent-blue); }
        .block { background-color: var(--card-gray); display: flex; align-items: center; justify-content: center; font-size: 0.6rem; cursor: grab; text-align: center; padding: 2px; border-radius: 2px; user-select: none; position: relative; gap: 2px; min-height: 30px; }
        .block.leader { grid-column: span 2; grid-row: span 2; font-size: 0.8rem; font-weight: bold; min-height: 65px; }
        .status-green { background-color: var(--card-green) !important; }
        .status-red { background-color: var(--card-red) !important; }
        .status-yellow { background-color: var(--card-yellow) !important; color: #000 !important; }
        #modalOverlay, #authOverlay, #confirmOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 100; }
        .modal { background: #222; padding: 20px; border-radius: 8px; width: 320px; border: 1px solid #444; position: relative; }
        .delete-btn-corner { position: absolute; top: 10px; left: 10px; color: var(--card-red); cursor: pointer; font-size: 1.2rem; }
        .option-row { display: flex; justify-content: space-between; margin-bottom: 12px; align-items: center; }
        select { padding: 4px; background: #333; color: white; border: 1px solid #555; border-radius: 3px; }
        .btn-action { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--accent-blue); color: white; }
        .btn-danger { background: var(--card-red); color: white; }
        input[type="password"] { width: 100%; padding: 10px; margin: 10px 0; background: #333; border: 1px solid #555; color: white; text-align: center; }
        .loading-text { text-align: center; color: var(--accent-blue); margin-top: 50px; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="main-title">Machine Plant1 Dashboard</div>
<div class="watermark">Created By RiDFinity</div>
<div class="live-clock" id="liveClock">กำลังโหลด...</div>
<div class="dashboard" id="dashboard"><div class="loading-text">กำลังดึงข้อมูลจาก Google Sheets...</div></div>

<div id="authOverlay"><div class="modal"><h3 style="text-align: center;">กรุณาใส่รหัสผ่าน</h3><input type="password" id="mainPass" oninput="checkAuthBtn(this, 'authBtn')"><button id="authBtn" class="btn-action btn-blue" style="display:none;" onclick="unlockApp()">เข้าสู่ระบบ</button></div></div>
<div id="modalOverlay"><div class="modal"><div class="delete-btn-corner" onclick="askDelete()">🗑️</div><h3 style="margin-top:0; color: var(--accent-blue); text-align: center;" id="modalTitle"></h3><div class="option-row"><span>1. ใช้งานได้</span><select id="opt1" onchange="validateForm()"><option value="">เลือก</option><option value="true">✅ ถูก</option><option value="false">❌ ผิด</option></select></div><div class="option-row"><span>2. น็อตครบ</span><select id="opt2" onchange="validateForm()"><option value="">เลือก</option><option value="true">✅ ถูก</option><option value="false">❌ ผิด</option></select></div><div class="option-row"><span>3. สะอาด</span><select id="opt3" onchange="validateForm()"><option value="">เลือก</option><option value="true">✅ ถูก</option><option value="false">❌ ผิด</option></select></div><button id="saveBtn" class="btn-action btn-blue" style="display:none;" onclick="saveStatus()">บันทึก</button><button onclick="closeModal()" style="margin-top: 10px; width: 100%; background: none; color: #aaa; border: none; cursor: pointer;">ปิดหน้าต่าง</button></div></div>
<div id="confirmOverlay"><div class="modal" style="text-align: center;"><h3>ยืนยันการลบ?</h3><p>บล็อกนี้จะถูกซ่อนไว้จนกว่าจะมีการรีโหลดข้อมูลใหม่</p><button class="btn-action btn-danger" onclick="confirmDelete()">ใช่, ลบเลย</button><button onclick="document.getElementById('confirmOverlay').style.display='none'" style="margin-top: 10px; width: 100%; background: none; color: #aaa; border: none; cursor: pointer;">ยกเลิก</button></div></div>

<script>
    const MASTER_KEY = "cpram2026";
    const totalGroups = 15;
    // นำ Web App URL ที่ได้จากการ Deploy มาวางที่นี่
    const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbxK-uW3Q4nygtCdobh6-SbhT1jwZfYS-8fQxR2o-NPTrfQnM5xz4OkZUhItxqyXld4oJQ/exec";

    const FIXED_GROUP_NAMES = { 1: "ห้องเนื้อ", 2: "COOK1&3", 3: "ห้องส่วนผสม", 4: "ห้องผัก", 5: "ห้องหุงข้าว", 6: "ห้องย่างไก่", 7: "COOK2", 8: "ห้องล้างโซนดิบ", 9: "ห้องผสมไส้", 10: "ห้องส่งออก", 11: "PACK A", 12: "PACK B", 13: "ห้องข้าว", 14: "ห้องกล่อง", 15: "ห้องเบอร์เกอร์" };

    let appData = JSON.parse(localStorage.getItem('heatmapData')) || {};
    let groupOrder = JSON.parse(localStorage.getItem('groupOrder')) || {};
    let nameMap = {}, leaderStatusMap = {}, statusMap = {}; // เพิ่ม statusMap
    let currentTargetId = null, rawSheetData = [];

    async function loadSheetData() {
        try {
            const response = await fetch(SHEET_API_URL);
            rawSheetData = await response.json();
            if (rawSheetData && rawSheetData.length > 0) {
                rawSheetData.forEach(item => {
                    nameMap[item.id] = item.name;
                    leaderStatusMap[item.id] = item.isLeader;
                    statusMap[item.id] = item.status; // เก็บค่า 0, 1, 2
                });
                renderDashboard();
            }
        } catch (error) {
            console.error("Fetch Error:", error);
            document.getElementById('dashboard').innerHTML = `<div style="color:red; text-align:center; width:100%;">เกิดข้อผิดพลาดในการโหลดข้อมูล</div>`;
        }
    }

    function renderDashboard() {
        const container = document.getElementById('dashboard');
        container.innerHTML = '';
        const groupContents = {};
        for (let i = 1; i <= totalGroups; i++) groupContents[i] = [];
        const placedIds = new Set();
        Object.values(groupOrder).forEach(ids => ids.forEach(id => placedIds.add(id)));
        for (let g = 1; g <= totalGroups; g++) {
            if (groupOrder[g]) {
                groupOrder[g].forEach(id => { if (nameMap[id]) groupContents[g].push(id); });
            }
        }
        rawSheetData.forEach((item, index) => {
            if (!placedIds.has(item.id.toString()) && !placedIds.has(item.id)) {
                let targetG = (index % totalGroups) + 1;
                groupContents[targetG].push(item.id);
            }
        });
        for (let g = 1; g <= totalGroups; g++) {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'group-container';
            groupDiv.innerHTML = `<div class="group-header"><span>${FIXED_GROUP_NAMES[g] || g}</span></div>`;
            const contentDiv = document.createElement('div');
            contentDiv.className = 'group-content';
            contentDiv.id = `group-${g}`;
            groupContents[g].forEach(id => { contentDiv.appendChild(createBlock(id)); });
            groupDiv.appendChild(contentDiv);
            container.appendChild(groupDiv);
            new Sortable(contentDiv, { group: 'shared', animation: 150, ghostClass: 'sortable-ghost', chosenClass: 'sortable-chosen', onEnd: saveAllOrders });
        }
    }

    function saveAllOrders() {
        const newOrder = {};
        for (let i = 1; i <= totalGroups; i++) {
            const el = document.getElementById(`group-${i}`);
            if (el) newOrder[i] = Array.from(el.children).map(child => child.id);
        }
        groupOrder = newOrder;
        localStorage.setItem('groupOrder', JSON.stringify(groupOrder));
    }

    function createBlock(id) {
        const div = document.createElement('div');
        const isLeader = leaderStatusMap[id] === true;
        div.className = `block ${isLeader ? 'leader' : ''}`;
        div.id = id;
        div.innerText = nameMap[id] || "N/A";
        div.onclick = (e) => { if (e.target === div) openModal(id); };
        
        // ตรวจสอบสี (Sheet มี Priority สูงกว่า Manual)
        applyColor(div, id);
        return div;
    }

    function applyColor(el, id) {
        if (!el) return;
        el.classList.remove('status-green', 'status-red', 'status-yellow');
        
        const s = statusMap[id];
        // 1. ตรวจจาก Google Sheets
        if (s === 0 || s === "0") el.classList.add('status-green');
        else if (s === 1 || s === "1") el.classList.add('status-yellow');
        else if (s === 2 || s === "2") el.classList.add('status-red');
        // 2. ถ้าใน Sheets ไม่มี ให้ดูจาก Manual (appData)
        else if (appData[id]) {
            const data = appData[id];
            if (data.v1 === true && data.v2 === true && data.v3 === true) el.classList.add('status-green');
            else if (data.v1 === false) el.classList.add('status-red');
            else if (data.v1 !== "" && data.v2 !== "" && data.v3 !== "") el.classList.add('status-yellow');
        }
    }

    function openModal(id) {
        currentTargetId = id;
        document.getElementById('modalTitle').innerText = nameMap[id];
        document.getElementById('modalOverlay').style.display = 'flex';
        const d = appData[id] || { v1: '', v2: '', v3: '' };
        document.getElementById('opt1').value = (d.v1 === "" || d.v1 === undefined) ? "" : d.v1.toString();
        document.getElementById('opt2').value = (d.v2 === "" || d.v2 === undefined) ? "" : d.v2.toString();
        document.getElementById('opt3').value = (d.v3 === "" || d.v3 === undefined) ? "" : d.v3.toString();
        validateForm();
    }

    function saveStatus() {
        appData[currentTargetId] = {
            v1: document.getElementById('opt1').value === "true",
            v2: document.getElementById('opt2').value === "true",
            v3: document.getElementById('opt3').value === "true"
        };
        localStorage.setItem('heatmapData', JSON.stringify(appData));
        applyColor(document.getElementById(currentTargetId), currentTargetId);
        closeModal();
    }

    function validateForm() {
        const v1 = document.getElementById('opt1').value, v2 = document.getElementById('opt2').value, v3 = document.getElementById('opt3').value;
        document.getElementById('saveBtn').style.display = (v1 !== "" && v2 !== "" && v3 !== "") ? 'block' : 'none';
    }

    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
    function askDelete() { document.getElementById('confirmOverlay').style.display = 'flex'; }
    function confirmDelete() {
        const el = document.getElementById(currentTargetId);
        if(el) el.remove();
        saveAllOrders();
        document.getElementById('confirmOverlay').style.display = 'none';
        closeModal();
    }

    function checkAuthBtn(input, btnId) { document.getElementById(btnId).style.display = input.value.length > 0 ? 'block' : 'none'; }
    function unlockApp() {
        if (document.getElementById('mainPass').value === MASTER_KEY) {
            sessionStorage.setItem('isLoggedIn', 'true');
            document.getElementById('authOverlay').style.display = 'none';
        } else alert('รหัสผ่านไม่ถูกต้อง');
    }

    window.onload = () => {
        if (sessionStorage.getItem('isLoggedIn') !== 'true') document.getElementById('authOverlay').style.display = 'flex';
        loadSheetData();
        setInterval(() => { document.getElementById('liveClock').innerText = new Date().toLocaleString('th-TH'); }, 1000);
    };
</script>
</body>
</html>
