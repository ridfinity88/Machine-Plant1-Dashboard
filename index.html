<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personnel Monitoring Dashboard Pro</title>
    <style>
        :root {
            --bg-color: #000;
            --card-gray: #424242;
            --card-green: #2e7d32;
            --card-red: #c62828;
            --card-yellow: #fbc02d;
            --text-color: #fff;
            --accent-blue: #2196F3;
        }

        * { box-sizing: border-box; }
        html, body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
            margin: 0; padding: 10px;
            width: 100vw; height: 100vh;
            overflow: hidden; position: relative;
        }

        /* 1. หัวข้อ Machine Plant1 ด้านบนกึ่งกลาง */
        .main-title {
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.4rem;
            font-weight: bold;
            color: #ccc);
            z-index: 5;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* 2. ลายน้ำ RiDFinity ด้านล่างกึ่งกลาง */
        .watermark {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.2);
            z-index: 5;
            pointer-events: none;
            letter-spacing: 3px;
        }

        .live-clock {
            position: absolute; top: 10px; left: 15px; z-index: 10;
            background: #444; color: #ccc; border: 1px solid #555;
            padding: 5px 10px; font-size: 0.8rem;
        }

        .header-controls { position: absolute; top: 10px; right: 15px; z-index: 10; }
        .btn-reset-main {
            background: #444; color: #ccc; border: 1px solid #555;
            padding: 5px 10px; cursor: pointer; font-size: 0.8rem;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(5, 1fr); 
            grid-template-rows: repeat(3, 29vh); /* ปรับลดเล็กน้อยเพื่อให้พอดีกับหัวข้อ/ลายน้ำ */
            gap: 10px; width: 100%; margin-top: 40px;
        }

        .group-container {
            border: 1px solid #333; background: #1a1a1a; padding: 5px;
            display: flex; flex-direction: column; border-radius: 4px; position: relative;
        }

        .group-header {
            font-size: 0.75rem; font-weight: bold; margin-bottom: 5px;
            border-bottom: 1px solid #333; padding-bottom: 2px; color: #aaa;
            display: flex; justify-content: center; align-items: center; gap: 5px;
        }

        .btn-add-block {
            position: absolute; top: 2px; right: 5px; color: var(--accent-blue);
            cursor: pointer; font-size: 1.2rem; font-weight: bold; width: 25px; text-align: center;
        }
        .btn-add-block:hover { color: white; }

        .group-content {
            display: grid; grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: minmax(30px, auto); gap: 3px;
            flex-grow: 1; align-content: start; min-height: 80px; overflow-y: auto;
        }

        .block {
            background-color: var(--card-gray); display: flex; align-items: center;
            justify-content: center; font-size: 0.6rem; cursor: grab;
            text-align: center; padding: 2px; border-radius: 2px; user-select: none;
            position: relative; gap: 2px;
        }
        .block.dragging { opacity: 0.3; border: 1px dashed #fff; }

        .block.leader {
            grid-column: span 2; grid-row: span 2;
            font-size: 0.8rem; font-weight: bold; min-height: 65px;
        }

        .edit-icon { cursor: pointer; font-size: 0.7rem; opacity: 0.6; }
        .edit-icon:hover { opacity: 1; color: var(--accent-blue); }

        .status-green { background-color: var(--card-green) !important; }
        .status-red { background-color: var(--card-red) !important; }
        .status-yellow { background-color: var(--card-yellow) !important; color: #000; }

        #modalOverlay, #authOverlay, #confirmOverlay, #addChoiceOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 100;
        }
        .modal { background: #222; padding: 20px; border-radius: 8px; width: 320px; border: 1px solid #444; position: relative; }
        
        .delete-btn-corner {
            position: absolute; top: 10px; left: 10px; color: var(--card-red);
            cursor: pointer; font-size: 1.2rem;
        }

        .option-row { display: flex; justify-content: space-between; margin-bottom: 12px; align-items: center; }
        select { padding: 4px; background: #333; color: white; border: 1px solid #555; border-radius: 3px; }
        
        .btn-action { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--accent-blue); color: white; }
        .btn-gray { background: #444; color: white; }
        .btn-danger { background: var(--card-red); color: white; }

        #saveBtn { display: none; }
        input[type="password"] { width: 100%; padding: 10px; margin: 10px 0; background: #333; border: 1px solid #555; color: white; text-align: center; }
    </style>
</head>
<body>

<div class="main-title">Machine Plant1</div>

<div class="watermark">Created By RiDFinity</div>

<div class="live-clock" id="liveClock">กำลังโหลด...</div>
<div class="header-controls">
    <button class="btn-reset-main" onclick="manualReset()">RESET STATUS</button>
</div>

<div class="dashboard" id="dashboard"></div>

<div id="authOverlay">
    <div class="modal">
        <h3 style="text-align: center;">กรุณาใส่รหัสผ่าน</h3>
        <input type="password" id="mainPass" oninput="checkAuthBtn(this, 'authBtn')">
        <button id="authBtn" class="btn-action btn-blue" style="display:none;" onclick="unlockApp()">เข้าสู่ระบบ</button>
    </div>
</div>

<div id="addChoiceOverlay">
    <div class="modal">
        <h3 style="text-align: center; color: var(--accent-blue);">เพิ่มรายการใหม่</h3>
        <p style="text-align: center; font-size: 0.9rem; color: #ccc;">กรุณาเลือกประเภทบล็อกที่ต้องการเพิ่ม</p>
        <button class="btn-action btn-blue" onclick="executeAddBlock('leader')">บล็อกใหญ่</button>
        <button class="btn-action btn-gray" onclick="executeAddBlock('member')">บล็อกเล็ก</button>
        <button onclick="document.getElementById('addChoiceOverlay').style.display='none'" style="margin-top: 15px; width: 100%; background: none; color: #aaa; border: none; cursor: pointer;">ยกเลิก</button>
    </div>
</div>

<div id="modalOverlay">
    <div class="modal">
        <div class="delete-btn-corner" onclick="askDelete()">🗑️</div>
        <h3 style="margin-top:0; color: var(--accent-blue); text-align: center;">
            <span id="modalTitle"></span>
            <span class="edit-icon" onclick="editBlockName()">✏️</span>
        </h3>
        <div class="option-row"><span>1. ใช้งานได้</span><select id="opt1" onchange="validateForm()"><option value="">เลือก</option><option value="true">✅ ถูก</option><option value="false">❌ ผิด</option></select></div>
        <div class="option-row"><span>2. น็อตครบ</span><select id="opt2" onchange="validateForm()"><option value="">เลือก</option><option value="true">✅ ถูก</option><option value="false">❌ ผิด</option></select></div>
        <div class="option-row"><span>3. สะอาด</span><select id="opt3" onchange="validateForm()"><option value="">เลือก</option><option value="true">✅ ถูก</option><option value="false">❌ ผิด</option></select></div>
        <button id="saveBtn" class="btn-action btn-blue" onclick="saveStatus()">บันทึก</button>
        <button onclick="closeModal()" style="margin-top: 10px; width: 100%; background: none; color: #aaa; border: none; cursor: pointer;">ปิดหน้าต่าง</button>
    </div>
</div>

<div id="confirmOverlay">
    <div class="modal" style="text-align: center;">
        <h3>ยืนยันการลบ?</h3>
        <p>คุณต้องการลบบล็อกนี้ออกจากระบบใช่หรือไม่?</p>
        <button class="btn-action btn-danger" onclick="confirmDelete()">ใช่, ลบเลย</button>
        <button onclick="document.getElementById('confirmOverlay').style.display='none'" style="margin-top: 10px; width: 100%; background: none; color: #aaa; border: none; cursor: pointer;">ยกเลิก</button>
    </div>
</div>

<script>
    const MASTER_KEY = "cpram2026";
    const totalGroups = 15;
    let currentTargetId = null;
    let targetGroupIdForAdd = null;

    let appData = JSON.parse(localStorage.getItem('heatmapData')) || {};
    let groupMap = JSON.parse(localStorage.getItem('groupMap'));
    let nameMap = JSON.parse(localStorage.getItem('nameMap')) || {};
    let groupNames = JSON.parse(localStorage.getItem('groupNames')) || {};

    function checkInitialData() {
        if (!groupMap) {
            groupMap = {};
            for (let g = 1; g <= totalGroups; g++) {
                groupMap[g] = [];
                for (let p = 1; p <= 10; p++) {
                    let id = `g${g}-p${p}-${Date.now()}-${p}`;
                    groupMap[g].push(id);
                    nameMap[id] = (p <= 2) ? `ห${p}` : `ส${p-2}`;
                }
            }
            saveAll();
        }
    }

    function saveAll() {
        localStorage.setItem('groupMap', JSON.stringify(groupMap));
        localStorage.setItem('nameMap', JSON.stringify(nameMap));
        localStorage.setItem('groupNames', JSON.stringify(groupNames));
    }

    function renderDashboard() {
        const container = document.getElementById('dashboard');
        container.innerHTML = '';
        for (let g = 1; g <= totalGroups; g++) {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'group-container';
            const gName = groupNames[g] || `กลุ่มที่ ${g}`;
            groupDiv.innerHTML = `
                <div class="group-header">
                    <span>${gName}</span>
                    <span class="edit-icon" onclick="editGroupName(${g})">✏️</span>
                </div>
                <div class="btn-add-block" onclick="showAddChoice(${g})">+</div>
            `;
            const contentDiv = document.createElement('div');
            contentDiv.className = 'group-content';
            contentDiv.id = `content-${g}`;
            contentDiv.ondragover = (e) => {
                e.preventDefault();
                const dragging = document.querySelector('.dragging');
                const afterElement = getDragAfterElement(contentDiv, e.clientY);
                if (afterElement == null) contentDiv.appendChild(dragging);
                else contentDiv.insertBefore(dragging, afterElement);
            };
            contentDiv.ondrop = (e) => { e.preventDefault(); saveCurrentOrder(); };

            if (groupMap[g]) {
                groupMap[g].forEach(id => {
                    contentDiv.appendChild(createBlock(id));
                });
            }
            groupDiv.appendChild(contentDiv);
            container.appendChild(groupDiv);
        }
    }

    function createBlock(id) {
        const div = document.createElement('div');
        const isLeader = id.includes('-lead-') || id.includes('-p1') || id.includes('-p2') || (nameMap[id] && nameMap[id].startsWith('ห'));
        div.className = `block ${isLeader ? 'leader' : ''}`;
        div.id = id;
        div.draggable = true;
        div.innerText = nameMap[id] || "N/A";
        div.ondragstart = () => div.classList.add('dragging');
        div.ondragend = () => div.classList.remove('dragging');
        div.onclick = () => openModal(id);
        applyColor(div, appData[id]);
        return div;
    }

    function showAddChoice(groupId) {
        targetGroupIdForAdd = groupId;
        document.getElementById('addChoiceOverlay').style.display = 'flex';
    }

    function executeAddBlock(type) {
        const timestamp = Date.now();
        const typeKey = (type === 'leader') ? 'lead' : 'mem';
        const newId = `new-${typeKey}-${timestamp}`;
        const defaultName = "N/A";
        
        groupMap[targetGroupIdForAdd].push(newId);
        nameMap[newId] = defaultName;
        
        saveAll();
        document.getElementById('addChoiceOverlay').style.display = 'none';
        renderDashboard();
    }

    function editGroupName(gId) {
        const oldName = groupNames[gId] || `กลุ่มที่ ${gId}`;
        const newName = prompt("แก้ไขชื่อกลุ่ม:", oldName);
        if (newName) { groupNames[gId] = newName; saveAll(); renderDashboard(); }
    }

    function editBlockName() {
        const oldName = nameMap[currentTargetId];
        const newName = prompt("แก้ไขชื่อ:", oldName);
        if (newName) {
            nameMap[currentTargetId] = newName;
            document.getElementById('modalTitle').innerText = newName;
            saveAll();
            renderDashboard();
        }
    }

    function askDelete() { document.getElementById('confirmOverlay').style.display = 'flex'; }

    function confirmDelete() {
        for (let g in groupMap) { groupMap[g] = groupMap[g].filter(id => id !== currentTargetId); }
        delete appData[currentTargetId];
        delete nameMap[currentTargetId];
        saveAll();
        document.getElementById('confirmOverlay').style.display = 'none';
        closeModal();
        renderDashboard();
    }

    function saveCurrentOrder() {
        for (let g = 1; g <= totalGroups; g++) {
            const blocks = [...document.getElementById(`content-${g}`).querySelectorAll('.block')];
            groupMap[g] = blocks.map(b => b.id);
        }
        saveAll();
    }

    function openModal(id) {
        currentTargetId = id;
        document.getElementById('modalTitle').innerText = nameMap[id];
        document.getElementById('modalOverlay').style.display = 'flex';
        const d = appData[id] || { v1: '', v2: '', v3: '' };
        document.getElementById('opt1').value = (d.v1 === undefined || d.v1 === "") ? "" : d.v1.toString();
        document.getElementById('opt2').value = (d.v2 === undefined || d.v2 === "") ? "" : d.v2.toString();
        document.getElementById('opt3').value = (d.v3 === undefined || d.v3 === "") ? "" : d.v3.toString();
        validateForm();
    }

    function saveStatus() {
        appData[currentTargetId] = {
            v1: document.getElementById('opt1').value === "true",
            v2: document.getElementById('opt2').value === "true",
            v3: document.getElementById('opt3').value === "true"
        };
        localStorage.setItem('heatmapData', JSON.stringify(appData));
        applyColor(document.getElementById(currentTargetId), appData[currentTargetId]);
        closeModal();
    }

    function applyColor(el, data) {
        if (!data || !el) return;
        el.classList.remove('status-green', 'status-red', 'status-yellow');
        if (data.v1 === true && data.v2 === true && data.v3 === true) el.classList.add('status-green');
        else if (data.v1 === false) el.classList.add('status-red');
        else if (data.v1 !== "" && data.v2 !== "" && data.v3 !== "") el.classList.add('status-yellow');
    }

    function getDragAfterElement(container, y) {
        const draggables = [...container.querySelectorAll('.block:not(.dragging)')];
        return draggables.reduce((closest, child) => {
            const box = child.getBoundingClientRect();
            const offset = y - box.top - box.height / 2;
            if (offset < 0 && offset > closest.offset) return { offset: offset, element: child };
            else return closest;
        }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    function manualReset() {
        if (prompt("รหัสผ่าน RESET สถานะสี:") === MASTER_KEY) {
            appData = {};
            localStorage.setItem('heatmapData', JSON.stringify(appData));
            location.reload();
        }
    }

    function checkReset() {
        const now = new Date();
        const last = localStorage.getItem('lastResetDate');
        if (last !== now.toDateString() && now.getHours() >= 5) {
            appData = {};
            localStorage.setItem('heatmapData', JSON.stringify(appData));
            localStorage.setItem('lastResetDate', now.toDateString());
            location.reload();
        }
    }

    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
    function validateForm() {
        const v1 = document.getElementById('opt1').value, v2 = document.getElementById('opt2').value, v3 = document.getElementById('opt3').value;
        document.getElementById('saveBtn').style.display = (v1 !== "" && v2 !== "" && v3 !== "") ? 'block' : 'none';
    }
    function checkAuthBtn(input, btnId) { document.getElementById(btnId).style.display = input.value.length > 0 ? 'block' : 'none'; }
    function unlockApp() {
        if (document.getElementById('mainPass').value === MASTER_KEY) {
            sessionStorage.setItem('isLoggedIn', 'true');
            document.getElementById('authOverlay').style.display = 'none';
        } else alert('รหัสผ่านไม่ถูกต้อง');
    }

    window.onload = () => {
        if (sessionStorage.getItem('isLoggedIn') !== 'true') document.getElementById('authOverlay').style.display = 'flex';
        checkReset();
        checkInitialData();
        renderDashboard();
        setInterval(() => {
            document.getElementById('liveClock').innerText = new Date().toLocaleString('th-TH');
        }, 1000);
    };
</script>
</body>
</html>
