<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personnel Monitoring Dashboard (Mixed Layout)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            /* ==========================================
               จุดปรับแต่งขนาด (CONFIG AREA)
               ========================================== */
            --row-height: 33.33vh;
            --dashboard-gap: 8px;
            
            /* ล็อคความสูง Box */
            --block-height: 35px;       
            --leader-height: 74px;      /* (35px * 2) + gap 4px */
            
            /* สีและสไตล์ */
            --bg-color: #000;
            --card-gray: #424242;
            --card-green: #2e7d32;
            --card-red: #c62828;
            --card-yellow: #fbc02d;
            --text-color: #fff;
            --accent-blue: #2196F3;
        }

        * { box-sizing: border-box; }
        html, body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden; 
        }
        
        .main-title { position: absolute; top: 5px; left: 50%; transform: translateX(-50%); font-size: 1.1rem; font-weight: bold; color: #ccc; z-index: 5; text-transform: uppercase; }
        .live-clock { position: absolute; top: 5px; left: 10px; z-index: 10; background: #333; padding: 4px 8px; font-size: 0.7rem; border-radius: 4px; }
        .watermark { position: absolute; bottom: 5px; right: 10px; font-size: 0.6rem; color: rgba(255, 255, 255, 0.2); }

        /* Dashboard Layout 8x3 */
        .dashboard { 
    display: grid; 
    width: 100vw; 
    height: 100vh;
    padding: 40px 10px 10px 10px;
    gap: var(--dashboard-gap);
    grid-template-columns: repeat(8, 1fr);

    /* แก้ไขบรรทัดนี้: แถวที่ 1, แถวที่ 2, แถวที่ 3 ตามลำดับ */
    grid-template-rows: 60px 60px 40px; 

    grid-template-areas: 
        "g1 g1 g2 g2 g3 g3 g4 g5"
        "g1 g1 g2 g2 g3 g3 g6 g7"
        "g8 g9 g10 g11 g12 g13 g14 g15";
}

        #container-1 { grid-area: g1; }
        #container-2 { grid-area: g2; }
        #container-3 { grid-area: g3; }
        #container-4 { grid-area: g4; }
        #container-5 { grid-area: g5; }
        #container-6 { grid-area: g6; }
        #container-7 { grid-area: g7; }
        #container-8 { grid-area: g8; }
        #container-9 { grid-area: g9; }
        #container-10 { grid-area: g10; }
        #container-11 { grid-area: g11; }
        #container-12 { grid-area: g12; }
        #container-13 { grid-area: g13; }
        #container-14 { grid-area: g14; }
        #container-15 { grid-area: g15; }

        .group-container { 
            border: 1px solid #333; 
            background: #111; 
            padding: 6px; 
            display: flex; 
            flex-direction: column; 
            border-radius: 4px; 
            overflow: hidden; 
        }

        .group-header { 
            font-size: 0.7rem; 
            font-weight: bold; 
            margin-bottom: 6px; 
            border-bottom: 1px solid #222; 
            padding-bottom: 4px; 
            color: #aaa; 
            text-align: center; 
        }
        
        .group-content { 
            display: grid; 
            grid-auto-rows: var(--block-height); 
            gap: 4px; 
            flex-grow: 1; 
            align-content: start; 
            overflow-y: auto;
        }

        /* -------------------------------------------
           [กลุ่มเล็ก: 4-15] 1 แถว 4 คอลัมน์ (เดิม)
           ------------------------------------------- */
        .group-content.small-group {
            grid-template-columns: repeat(4, 1fr);
        }
        .small-group .block { grid-column: span 1; }
        .small-group .block.leader { grid-column: span 2; grid-row: span 2; height: var(--leader-height); }

        /* -------------------------------------------
           [กลุ่มใหญ่: 1-3] 1 แถว 8 คอลัมน์ (ใหม่)
           ------------------------------------------- */
        .group-content.large-group {
            grid-template-columns: repeat(8, 1fr);
        }
        /* Box เล็ก: ใส่ได้ 8 อันใน 1 แถว (ใช้ 1 ส่วนใน 8) */
        .large-group .block { 
            grid-column: span 1; 
        }
        /* Box ใหญ่: ใส่ได้ 4 อันใน 1 แถว (ใช้ 2 ส่วนใน 8) */
        .large-group .block.leader { 
            grid-column: span 2; 
            grid-row: span 2; 
            height: var(--leader-height);
        }

        /* Common Block Styles */
        .block { 
            background-color: var(--card-gray); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 0.52rem; 
            cursor: grab; 
            padding: 2px; 
            border-radius: 3px; 
            height: var(--block-height);
            text-align: center;
            line-height: 1.1;
        }
        .block.leader { 
            font-size: 0.6rem; 
            font-weight: bold; 
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* Status Colors */
        .status-green { background-color: var(--card-green) !important; }
        .status-red { background-color: var(--card-red) !important; }
        .status-yellow { background-color: var(--card-yellow) !important; color: #000 !important; }
        .status-unknown { background-color: #fff !important; color: #000 !important; }

        /* Auth UI */
        #authOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 100; }
        .modal { background: #222; padding: 25px; border-radius: 8px; width: 300px; text-align: center; border: 1px solid #444; }
        .btn-action { width: 100%; padding: 10px; margin-top: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; background: var(--accent-blue); color: white; }
        input[type="password"] { width: 100%; padding: 10px; margin: 10px 0; background: #333; border: 1px solid #555; color: white; text-align: center; }
    </style>
</head>
<body>

<div class="main-title">Machine Plant1 Dashboard</div>
<div class="live-clock" id="liveClock">...</div>
<div class="watermark">RiDFinity Design</div>

<div class="dashboard" id="dashboard"></div>

<div id="authOverlay">
    <div class="modal">
        <h3>Access Required</h3>
        <input type="password" id="mainPass" placeholder="Enter Password" oninput="checkAuthBtn(this, 'authBtn')">
        <button id="authBtn" class="btn-action" style="display:none;" onclick="unlockApp()">LOGIN</button>
    </div>
</div>

<script>
    const MASTER_KEY = "cpram2026";
    const totalGroups = 17;
    const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbxnJHrkUy5YuQ7rk37Dm0aT9nhlx4CuLn0g2y0NmRW6i9yPwJLZJXSJqB0UvFPUvQu1vA/exec";

    const FIXED_GROUP_NAMES = { 
        1: "ห้องส่งออก", 2: "PACK A", 3: "PACK B", 4: "ห้องย่างไก่", 
        5: "ห้องหุงข้าว", 6: "COOK1&3", 7: "COOK2", 8: "READY MEAL", 
        9: "ห้องเบอร์เกอร์", 10: "ห้องกล่อง", 11: "ห้องเนื้อ", 12: "ห้องผัก", 
        13: "SEASONING", 14: "ห้องล้าง สุก&ดิบ", 15: "Overhaul",
        16: "A1", 17: "A2" 
    };

    let rawSheetData = [];

    async function loadSheetData() {
        try {
            const response = await fetch(SHEET_API_URL);
            rawSheetData = await response.json();
            renderDashboard();
        } catch (error) { console.error("Fetch Error:", error); }
    }

    function renderDashboard() {
        const container = document.getElementById('dashboard');
        container.innerHTML = '';
        const groupContents = {};
        for (let i = 1; i <= totalGroups; i++) groupContents[i] = [];

        rawSheetData.forEach(item => {
            let assignedGroupName = (item.latestGroup || item.initialGroup || "").trim();
            let groupId = findGroupIdByName(assignedGroupName);
            if (groupId) groupContents[groupId].push(item);
            else {
                item.isUnknownGroup = true;
                groupContents[1].push(item); 
            }
        });

        for (let g = 1; g <= totalGroups; g++) {
            if (g > 15) continue; 

            const groupDiv = document.createElement('div');
            groupDiv.className = 'group-container';
            groupDiv.id = `container-${g}`;
            groupDiv.innerHTML = `<div class="group-header">${FIXED_GROUP_NAMES[g]}</div>`;
            
            const contentDiv = document.createElement('div');
            // แยก Class ตามขนาดกลุ่ม (1-3 คือกลุ่มใหญ่)
            const sizeClass = (g <= 3) ? 'large-group' : 'small-group';
            contentDiv.className = `group-content ${sizeClass}`;
            contentDiv.id = `group-${g}`;
            contentDiv.dataset.name = FIXED_GROUP_NAMES[g];

            groupContents[g].forEach(item => contentDiv.appendChild(createBlock(item)));
            groupDiv.appendChild(contentDiv);
            container.appendChild(groupDiv);

            new Sortable(contentDiv, {
                group: 'shared',
                animation: 150,
                onEnd: async (evt) => {
                    const itemEl = evt.item;
                    const newGroupName = evt.to.dataset.name;
                    const rowIndex = itemEl.dataset.rowindex;
                    await updateLatestGroupInSheet(rowIndex, newGroupName);
                    const itemData = rawSheetData.find(d => d.id === itemEl.id);
                    if(itemData) {
                        itemData.isUnknownGroup = false; 
                        applyColor(itemEl, itemData);
                    }
                }
            });
        }
    }

    function findGroupIdByName(name) {
        for (let id in FIXED_GROUP_NAMES) {
            if (FIXED_GROUP_NAMES[id] === name) return id;
        }
        return null;
    }

    async function updateLatestGroupInSheet(rowIndex, newGroupName) {
        try {
            await fetch(SHEET_API_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ rowIndex, newGroupName })
            });
        } catch (e) { console.error(e); }
    }

    function createBlock(item) {
        const div = document.createElement('div');
        div.className = `block ${item.isLeader ? 'leader' : ''}`;
        div.id = item.id;
        div.dataset.rowindex = item.rowIndex;
        div.innerText = item.name;
        applyColor(div, item);
        return div;
    }

    function applyColor(el, item) {
        el.classList.remove('status-green', 'status-red', 'status-yellow', 'status-unknown');
        if (item.isUnknownGroup) { el.classList.add('status-unknown'); return; }
        const s = item.status;
        if (s === 0 || s === "0") el.classList.add('status-green');
        else if (s === 1 || s === "1") el.classList.add('status-yellow');
        else if (s === 2 || s === "2") el.classList.add('status-red');
    }

    function checkAuthBtn(input, btnId) { document.getElementById(btnId).style.display = input.value.length > 0 ? 'block' : 'none'; }
    function unlockApp() {
        if (document.getElementById('mainPass').value === MASTER_KEY) {
            sessionStorage.setItem('isLoggedIn', 'true');
            document.getElementById('authOverlay').style.display = 'none';
        } else alert('Password Incorrect');
    }

    window.onload = () => {
        if (sessionStorage.getItem('isLoggedIn') !== 'true') document.getElementById('authOverlay').style.display = 'flex';
        loadSheetData();
        setInterval(() => { 
            const now = new Date();
            document.getElementById('liveClock').innerText = now.toLocaleString('th-TH'); 
        }, 1000);
    };
</script>
</body>
</html>
