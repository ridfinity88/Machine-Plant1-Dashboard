<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symmetry Machine Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        html, body { 
            height: 100vh; 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            background-color: #0f172a; 
            color: #f8fafc; 
        }

        /* [จุดปรับที่ 1] ปรับสัดส่วนความกว้าง "ซ้าย (รูป) : ขวา (กราฟ)" */
        .dashboard-container {
            display: grid;
            grid-template-columns: 1.4fr 0.6fr; /* แก้เลขตรงนี้เพื่อปรับความกว้างรวมของฝั่งซ้ายและขวา */
            gap: 1rem;
            height: calc(100vh - 4.5rem);
            padding: 0 1rem 1rem 1rem;
        }

        /* [จุดปรับที่ 2] บังคับให้ Card 1 และ 2 สูงเท่ากันคนละ 50% */
        .left-panel {
            display: grid;
            grid-template-rows: 1fr 1fr; /* 1fr 1fr คือแบ่งความสูงคนละหน้าเท่ากันเป๊ะ */
            gap: 1rem;
        }

        /* [จุดปรับที่ 3] บังคับสัดส่วนฝั่งขวา (3, 4, 5) */
        .right-panel {
            display: grid;
            grid-template-rows: 1fr 1.2fr; /* ปรับเลขเพื่อให้ 3 เท่ากับ 4+5 หรือตามใจชอบ */
            gap: 1rem;
        }

        .card { 
            background-color: #1e293b; 
            border: 1px solid #334155; 
            border-radius: 0.75rem; 
            position: relative; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 0;
            width: 100%;
            height: 100%;
        }

        /* บังคับรูปภาพให้ขยายเต็มพื้นที่แต่ไม่เสียสัดส่วน */
        .machine-img {
            width: 90%;
            height: 85%;
            object-fit: contain; /* สำคัญ: ทำให้รูป 1 และ 2 ขนาดดูเท่ากันเสมอ */
        }

        .label-tag {
            position: absolute;
            top: 0.75rem;
            left: 0.75rem;
            font-size: 0.75rem;
            color: #94a3b8;
            font-weight: bold;
            z-index: 10;
            background: rgba(15, 23, 42, 0.6);
            padding: 2px 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body class="flex flex-col">

    <header class="flex justify-between items-center h-14 px-6 flex-shrink-0">
        <h1 class="text-xl font-bold text-blue-400 uppercase tracking-tight">Machine Monitoring System</h1>
        <div id="clock" class="text-lg font-mono text-slate-400">00:00:00</div>
    </header>

    <main class="dashboard-container">
        
        <div class="left-panel">
            <div class="card">
                <span class="label-tag">① MACHINE INLET</span>
                <img src="in.png" alt=" " class="machine-img">
            </div>
            <div class="card">
                <span class="label-tag">② MACHINE OUTLET</span>
                <img src="out.png" alt=" " class="machine-img">
            </div>
        </div>

        <div class="right-panel">
            <div class="card !flex-row px-4">
                <span class="label-tag">③ STATUS RATIO</span>
                <div class="w-1/2 h-full py-8">
                    <canvas id="pieChart"></canvas>
                </div>
                <div class="w-1/2 flex flex-col justify-center pl-4 border-l border-slate-700/50">
                    <div class="text-xs text-slate-500 uppercase">Efficiency</div>
                    <div id="eff-val" class="text-3xl font-black text-green-400">--%</div>
                </div>
            </div>

            <div class="grid grid-rows-2 gap-4">
                <div class="card p-2">
                    <span class="label-tag">④ PRODUCTION</span>
                    <div class="w-full h-full pt-8">
                        <canvas id="lineChart"></canvas>
                    </div>
                </div>
                <div class="card !justify-start p-4 overflow-hidden">
                    <span class="label-tag">⑤ DATA</span>
                    <div class="w-full mt-8">
                        <table class="w-full text-[11px] text-left">
                            <thead class="text-blue-300 border-b border-slate-700">
                                <tr><th>Name</th><th class="text-center">T</th><th class="text-center">P</th><th class="text-right">S</th></tr>
                            </thead>
                            <tbody id="data-table"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxYeA5b5d9MMrpWhi1K19O5fqn5jliHDMUg0aCHdIfzlGtCTEQB33BrqgCzImSamZX8Bg/exec";

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        const pieChart = new Chart(document.getElementById('pieChart'), {
            type: 'doughnut',
            data: { datasets: [{ data: [85, 10, 5], backgroundColor: ['#10b981', '#f59e0b', '#ef4444'], borderWidth: 0 }] },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, cutout: '75%' }
        });

        const lineChart = new Chart(document.getElementById('lineChart'), {
            type: 'line',
            data: {
                labels: ['1','2','3','4','5'],
                datasets: [{ data: [10, 25, 15, 30, 20], borderColor: '#3b82f6', fill: true, backgroundColor: 'rgba(59,130,246,0.1)', tension: 0.4, pointRadius: 0 }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
        });

        async function fetchData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                let html = "";
                data.table.forEach(item => {
                    const statusColor = item.status === 'Running' ? 'text-green-400' : 'text-amber-400';
                    html += `<tr class="border-b border-slate-800/50">
                        <td class="py-2 font-bold text-slate-400">${item.machine}</td>
                        <td class="py-2 text-lg text-center text-blue-400 font-bold">${item.temp}</td>
                        <td class="py-2 text-lg text-center text-emerald-400 font-bold">${item.pressure}</td>
                        <td class="py-2 text-right font-bold ${statusColor}">${item.status.charAt(0)}</td>
                    </tr>`;
                });
                document.getElementById('data-table').innerHTML = html;
                document.getElementById('eff-val').innerText = data.machine1.temp + "%";
            } catch (e) { console.error(e); }
        }
        fetchData();
        setInterval(fetchData, 10000);
    </script>
</body>
</html>
