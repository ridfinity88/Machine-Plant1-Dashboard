<!DOCTYPE html>
<html lang="th">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machine Dashboard - Realtime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --width-col-left: 1.0fr; --width-col-center: 1.2fr; --width-col-right: 0.6fr; }
        body { background: #000; color: #fff; margin: 0; overflow: hidden; font-family: sans-serif; }
        
        /* สไตล์หน้า Login */
        #loginPage { position: fixed; inset: 0; background: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { width: 320px; background: #0f172a; padding: 30px; border-radius: 16px; border: 1px solid #334155; display: flex; flex-direction: column; gap: 15px; }
        .input-group { position: relative; width: 100%; }
        .login-box input { width: 100%; height: 45px; background: #020617; border: 1px solid #334155; border-radius: 8px; color: #fff; padding: 0 40px 0 12px; outline: none; }
        .eye-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 18px; }
        .login-btn { width: 100%; height: 45px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .error-text { color: #f87171; font-size: 13px; text-align: center; display: none; }

        #dashboardPage { display: none; flex-direction: column; height: 100vh; }
        .dashboard-container { display: grid; grid-template-columns: var(--width-col-left) var(--width-col-center) var(--width-col-right); gap: 1rem; padding: 1rem; height: calc(100vh - 60px); }
        .card { background: #000; border: 1px solid #334155; border-radius: 12px; position: relative; }

        /* Animation สำหรับไอคอนโหลด */
        .spin { animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        /* แถวข้อมูลกระพริบตอนอัปเดต */
        .row-update { animation: highlight 1s ease-out; }
        @keyframes highlight { 0% { background: rgba(59, 130, 246, 0.2); } 100% { background: transparent; } }
    </style>
</head>
<body>

    <div id="loginPage">
        <div class="login-box">
            <h2 class="text-center text-blue-400 font-bold text-xl uppercase tracking-widest">Login</h2>
            <div class="input-group">
                <input type="password" id="passInput" placeholder="รหัสผ่าน" onkeypress="handleEnter(event)" autocomplete="off">
                <button type="button" class="eye-btn" onclick="togglePass()"><span id="eyeIcon">👁️</span></button>
            </div>
            <button class="login-btn" onclick="checkLogin()">เข้าสู่ระบบ</button>
            <p id="errorTxt" class="error-text">รหัสผ่านไม่ถูกต้อง</p>
        </div>
    </div>

    <div id="dashboardPage">
        <header class="flex justify-between items-center h-14 px-6 border-b border-slate-800">
            <h1 class="text-blue-400 font-bold tracking-tight text-lg">MACHINE MONITORING</h1>
            <div class="flex items-center gap-3">
                <div id="clock" class="font-mono text-slate-400 text-lg">00:00:00</div>
                <div id="syncStatus" class="text-xl">
                    <span class="text-green-500">✅</span>
                </div>
            </div>
        </header>

        <main class="dashboard-container">
            <div class="card p-4 overflow-hidden">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-xs text-slate-500 font-bold uppercase tracking-wider">⑤ Data Real-time</span>
                </div>
                <table class="w-full text-[12px]">
                    <thead class="text-blue-300 border-b border-slate-800 text-left">
                        <tr>
                            <th class="pb-2">Name</th>
                            <th class="text-center pb-2">Temp</th>
                            <th class="text-center pb-2">Press</th>
                            <th class="text-right pb-2">Status</th>
                        </tr>
                    </thead>
                    <tbody id="data-table">
                        </tbody>
                </table>
            </div>

            <div class="grid grid-rows-3 gap-4">
                <div class="card flex items-center justify-center"><img src="cen.png" class="max-h-[85%]"></div>
                <div class="card flex items-center justify-center"><img src="in.png" class="max-h-[85%]"></div>
                <div class="card flex items-center justify-center"><img src="out.png" class="max-h-[85%]"></div>
            </div>

            <div class="grid grid-rows-2 gap-4">
                <div class="card p-4 flex flex-col items-center justify-around">
                    <canvas id="p1" width="80" height="80"></canvas>
                    <canvas id="p2" width="80" height="80"></canvas>
                </div>
                <div class="card p-4"><canvas id="lineChart"></canvas></div>
            </div>
        </main>
    </div>

    <script>
        const MY_PASS = "1234";
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxYeA5b5d9MMrpWhi1K19O5fqn5jliHDMUg0aCHdIfzlGtCTEQB33BrqgCzImSamZX8Bg/exec";

        // --- ระบบ Login ---
        function handleEnter(e) { if (e.key === 'Enter') checkLogin(); }

        function togglePass() {
            const input = document.getElementById('passInput');
            const icon = document.getElementById('eyeIcon');
            input.type = (input.type === "password") ? "text" : "password";
            icon.innerText = (input.type === "password") ? "👁️" : "🙈";
        }

        function checkLogin() {
            if (document.getElementById('passInput').value === MY_PASS) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboardPage').style.display = 'flex';
                startServices();
            } else {
                document.getElementById('errorTxt').style.display = 'block';
                document.getElementById('passInput').value = '';
                document.getElementById('passInput').focus();
            }
        }

        // --- ระบบการทำงาน Dashboard ---
        function startServices() {
            // นาฬิกา
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString();
            }, 1000);

            // โหลดข้อมูลครั้งแรก
            fetchData();
            
            // ตั้ง Auto-Refresh ทุก 10 วินาที
            setInterval(fetchData, 10000);
        }

        async function fetchData() {
            const statusBox = document.getElementById('syncStatus');
            const tableBody = document.getElementById('data-table');
            
            // 1. แสดงไอคอนกำลังโหลด (หมุนๆ)
            statusBox.innerHTML = '<span class="spin text-blue-400 text-lg">⚙️</span>';

            try {
                // เติม nocache เพื่อป้องกัน browser จำค่าเก่า
                const finalUrl = `${SCRIPT_URL}?t=${new Date().getTime()}`;
                const response = await fetch(finalUrl);
                const data = await response.json();
                
                if (data && data.table) {
                    let html = "";
                    data.table.forEach(item => {
                        const statusColor = (item.status === 'Running' || item.status === 'OK') ? 'text-green-400' : 'text-amber-400';
                        html += `
                            <tr class="border-b border-slate-900 row-update">
                                <td class="py-3 text-slate-300 font-bold">${item.machine}</td>
                                <td class="text-center text-blue-400 font-bold">${item.temp}</td>
                                <td class="text-center text-green-400 font-bold">${item.pressure}</td>
                                <td class="text-right font-bold ${statusColor}">${item.status}</td>
                            </tr>`;
                    });
                    
                    tableBody.innerHTML = html;

                    // 2. เมื่อสำเร็จ เปลี่ยนเป็นไอคอนเครื่องหมายถูกสีเขียว
                    statusBox.innerHTML = '<span class="text-green-500">✅</span>';
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                statusBox.innerHTML = '<span class="text-red-500">❌</span>';
            }
        }

        window.onload = () => document.getElementById('passInput').focus();
    </script>
</body>
</html>
