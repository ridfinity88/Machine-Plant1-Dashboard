<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symmetry Machine Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --width-col-left: 1.0fr;
            --width-col-center: 1.2fr;
            --width-col-right: 0.6fr;
            --height-cen-view: 0.6fr;
            --height-machine-1: 0.8fr;
            --height-machine-2: 0.8fr;
            --height-chart-top: 1fr;
            --height-chart-bottom: 1fr;
        }

        html, body {
            height: 100vh;
            margin: 0; padding: 0;
            overflow: hidden;
            background-color: #000000;
            color: #f8fafc;
            font-family: sans-serif;
        }

        /* LOGIN PAGE - ปิด Dashboard ไว้ก่อน */
        #loginPage {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 340px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .login-box h2 {
            text-align: center;
            color: #60a5fa;
            margin: 0;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .password-wrapper {
            position: relative;
            width: 100%;
        }

        .login-box input {
            width: 100%;
            height: 48px;
            background: #020617;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            padding: 0 45px 0 15px;
            font-size: 16px;
            outline: none;
        }

        .login-box input:focus { border-color: #2563eb; }

        .eye-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94a3b8;
            background: none;
            border: none;
            padding: 5px;
            display: flex;
            align-items: center;
        }

        .eye-toggle:hover { color: #f8fafc; }

        .login-btn {
            height: 48px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .login-btn:hover { background: #1d4ed8; }

        .error-text {
            color: #f87171;
            font-size: 13px;
            text-align: center;
            display: none;
        }

        #dashboardPage { display: none; width: 100%; height: 100%; }

        /* DASHBOARD LAYOUT */
        .dashboard-container {
            display: grid;
            grid-template-columns: var(--width-col-left) var(--width-col-center) var(--width-col-right);
            gap: 1rem;
            height: calc(100vh - 4.5rem);
            padding: 0 1rem 1rem 1rem;
        }

        .center-panel { display: grid; grid-template-rows: var(--height-cen-view) var(--height-machine-1) var(--height-machine-2); gap: 1rem; }
        .right-panel { display: grid; grid-template-rows: var(--height-chart-top) var(--height-chart-bottom); gap: 1rem; }

        .card {
            background-color: #000;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%; height: 100%;
        }

        .label-tag {
            position: absolute; top: 0.75rem; left: 0.75rem;
            font-size: 0.7rem; color: #94a3b8; font-weight: bold;
            background: rgba(15, 23, 42, 0.8);
            padding: 2px 8px; border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="loginPage">
        <div class="login-box">
            <h2>SYSTEM ACCESS</h2>
            <div class="password-wrapper">
                <input type="password" id="passwordInput" placeholder="Enter Password" autocomplete="current-password">
                <button class="eye-toggle" id="toggleBtn" type="button">
                    <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </button>
            </div>
            <button class="login-btn" id="loginBtn">LOGIN</button>
            <div class="error-text" id="errorMsg">Invalid Password. Try again.</div>
        </div>
    </div>

    <div id="dashboardPage" class="flex flex-col">
        <header class="flex justify-between items-center h-14 px-6 flex-shrink-0">
            <h1 class="text-xl font-bold text-blue-400 uppercase">Machine Monitoring</h1>
            <div id="clock" class="text-lg font-mono text-slate-400">00:00:00</div>
        </header>

        <main class="dashboard-container">
            <div class="card !justify-start p-4 overflow-hidden">
                <span class="label-tag">⑤ DATA</span>
                <div class="w-full mt-8">
                    <table class="w-full text-[11px] text-left">
                        <thead class="text-blue-300 border-b border-slate-700">
                            <tr><th>Name</th><th class="text-center">T</th><th class="text-center">P</th><th class="text-right">S</th></tr>
                        </thead>
                        <tbody id="data-table"></tbody>
                    </table>
                </div>
            </div>

            <div class="center-panel">
                <div class="card"><span class="label-tag">Center View</span><img src="cen.png" class="w-[90%] h-[85%] object-contain"></div>
                <div class="card"><span class="label-tag">① INLET</span><img src="in.png" class="w-[90%] h-[85%] object-contain"></div>
                <div class="card"><span class="label-tag">② OUTLET</span><img src="out.png" class="w-[90%] h-[85%] object-contain"></div>
            </div>

            <div class="right-panel">
                <div class="card p-4 !justify-around">
                    <span class="label-tag">③ STATUS</span>
                    <div class="relative w-[100px] h-[100px]">
                        <canvas id="pieChart1"></canvas>
                        <div id="val-p1" class="absolute inset-0 flex items-center justify-center font-bold text-green-400 text-[0.9rem]">85%</div>
                    </div>
                    <div class="relative w-[100px] h-[100px]">
                        <canvas id="pieChart2"></canvas>
                        <div id="val-p2" class="absolute inset-0 flex items-center justify-center font-bold text-blue-400 text-[0.9rem]">60%</div>
                    </div>
                </div>
                <div class="card p-2">
                    <span class="label-tag">④ PRODUCTION</span>
                    <div class="w-full h-full pt-8"><canvas id="lineChart"></canvas></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const PASSWORD_CORRECT = "1234"; // รหัสผ่าน
        const passInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        const eyeIcon = document.getElementById('eyeIcon');

        // SVG Path สำหรับไอคอนดวงตา
        const eyeOpen = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>`;
        const eyeClosed = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>`;

        function runLogin() {
            if (passInput.value === PASSWORD_CORRECT) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboardPage').style.display = 'flex';
                fetchData(); 
            } else {
                errorMsg.style.display = 'block';
                passInput.value = '';
                passInput.focus();
            }
        }

        // --- แก้ไขจุด Enter: กดแล้วทำงานทันที ---
        passInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault(); // กัน Browser refresh
                runLogin();
            }
        });

        loginBtn.addEventListener('click', runLogin);

        // --- แก้ไขจุดดวงตา: สลับไอคอน SVG ---
        document.getElementById('toggleBtn').addEventListener('click', () => {
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            eyeIcon.innerHTML = isPass ? eyeClosed : eyeOpen;
        });

        // DASHBOARD LOGIC (คงเดิม)
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxYeA5b5d9MMrpWhi1K19O5fqn5jliHDMUg0aCHdIfzlGtCTEQB33BrqgCzImSamZX8Bg/exec";
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        const pieChart1 = new Chart(document.getElementById('pieChart1'), { type: 'doughnut', data: { datasets: [{ data: [85, 15], backgroundColor: ['#10b981', '#1e293b'], borderWidth: 0 }] }, options: { maintainAspectRatio: false, cutout: '80%', plugins: { legend: { display: false } } } });
        const pieChart2 = new Chart(document.getElementById('pieChart2'), { type: 'doughnut', data: { datasets: [{ data: [60, 40], backgroundColor: ['#3b82f6', '#1e293b'], borderWidth: 0 }] }, options: { maintainAspectRatio: false, cutout: '80%', plugins: { legend: { display: false } } } });
        const lineChart = new Chart(document.getElementById('lineChart'), { type: 'line', data: { labels: [1,2,3,4,5], datasets: [{ label: 'S1', data: [10,25,15,30,20], borderColor: '#3b82f6', tension: 0.4, pointRadius: 0, borderWidth: 2 }] }, options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } } });

        async function fetchData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                let html = "";
                data.table.forEach(item => {
                    html += `<tr class="border-b border-slate-800/50"><td class="py-2 font-bold text-slate-400">${item.machine}</td><td class="py-2 text-lg text-center text-blue-400 font-bold">${item.temp}</td><td class="py-2 text-lg text-center text-emerald-400 font-bold">${item.pressure}</td><td class="py-2 text-right font-bold ${item.status==='Running'?'text-green-400':'text-amber-400'}">${item.status.charAt(0)}</td></tr>`;
                });
                document.getElementById('data-table').innerHTML = html;
            } catch (e) { console.error(e); }
        }
        setInterval(fetchData, 10000);
        window.onload = () => passInput.focus();
    </script>
</body>
</html>
