<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symmetry Machine Monitoring - Hidden Behind Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --width-col-left: 1.0fr;
            --width-col-center: 1.2fr;
            --width-col-right: 0.8fr;
            --card-green: #2e7d32;
            --card-yellow: #fbc02d;
            --card-red: #c62828;
        }
        
        html, body { 
            height: 100vh; 
            margin: 0; 
            padding: 0;
            overflow: hidden !important; 
            background-color: #000; 
            color: #fff; 
        }
        
        .dashboard-container {
            display: grid;
            grid-template-columns: var(--width-col-left) var(--width-col-center) var(--width-col-right);
            gap: 1rem; 
            height: calc(100vh - 4rem); 
            padding: 1rem;
        }
        
        /* Card ทำหน้าที่เป็นหน้าต่าง (Mask) */
        .card { 
            background: #111; 
            border: 1px solid #334155; 
            border-radius: 0.75rem; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            /* บังส่วนที่เกินออกมาทั้งหมด */
            overflow: hidden !important; 
        }
        
        .label-tag { 
            position: absolute; 
            top: 0.5rem; 
            left: 0.5rem; 
            font-size: 0.7rem; 
            color: #94a3b8; 
            background: rgba(0,0,0,0.8); 
            padding: 2px 8px; 
            border-radius: 4px; 
            z-index: 20; /* ให้อยู่เหนือ Drop-zone */
        }

        /* Container ชั้นในที่ซ่อนอยู่หลัง Card */
        .scroll-wrapper {
            position: relative;
            flex-grow: 1;
            /* ขยายให้กว้างกว่า Card เพื่อผลัก Scrollbar ออกไปข้างนอก */
            width: calc(100% + 30px); 
            overflow-y: auto;
            overflow-x: hidden;
            /* ซ่อน Scrollbar มาตรฐาน (เพื่อความชัวร์) */
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .scroll-wrapper::-webkit-scrollbar {
            display: none;
        }

        /* พื้นที่วาง Block */
        .drop-zone { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 0.5rem; 
            padding: 2.5rem 35px 1rem 0.5rem; /* padding ขวาเผื่อไว้กันตัวเลขโดนบัง */
            align-content: start; 
            min-height: 100%;
        }

        .drop-zone.large { 
            grid-template-columns: repeat(6, 1fr); 
        }

        .block { background: #424242; border-radius: 4px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; cursor: grab; text-align: center; padding: 2px; }
        .block.leader { grid-column: span 2; grid-row: span 2; height: 84px; font-weight: bold; border: 1px solid #666; }
        
        .status-0 { background-color: var(--card-green) !important; }
        .status-1 { background-color: var(--card-yellow) !important; color: #000; }
        .status-2 { background-color: var(--card-red) !important; }
        
        .ghost { opacity: 0.4; background: #3b82f6 !important; }
    </style>
</head>
<body class="flex flex-col">

    <header class="flex justify-between items-center h-12 px-6">
        <h1 class="text-lg font-bold text-blue-400 uppercase">Machine Plant Dashboard</h1>
        <div id="clock" class="font-mono text-slate-400">00:00:00</div>
    </header>

    <main class="dashboard-container">
        <!-- กลุ่มที่ 1 -->
        <div class="card">
            <span class="label-tag">GROUP 1: INLET</span>
            <div class="scroll-wrapper">
                <div id="group-1" class="drop-zone large" data-name="GROUP 1"></div>
            </div>
        </div>

        <!-- กลุ่มที่ 2 -->
        <div class="card">
            <span class="label-tag">GROUP 2: PROCESS</span>
            <div class="scroll-wrapper">
                <div id="group-2" class="drop-zone large" data-name="GROUP 2"></div>
            </div>
        </div>

        <!-- กลุ่มที่ 3 -->
        <div class="card">
            <span class="label-tag">GROUP 3: OUTLET</span>
            <div class="scroll-wrapper">
                <div id="group-3" class="drop-zone" data-name="GROUP 3"></div>
            </div>
        </div>
    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxLXGpD4n0Wi2_ksjjr7L5MHWiYJR-ZDjNsem9IKn1tEFUq6xhxnnCB7epqrZQmg7jCiA/exec";
        
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        async function loadData() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                renderBlocks(data);
            } catch (e) { console.error("Load Error", e); }
        }

        function renderBlocks(data) {
            document.querySelectorAll('.drop-zone').forEach(z => z.innerHTML = '');
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = `block status-${item.status} ${item.isLeader ? 'leader' : ''}`;
                div.id = item.id;
                div.dataset.rowindex = item.rowIndex;
                div.innerText = item.name;
                const targetGroupName = item.latestGroup || item.initialGroup;
                const targetZone = Array.from(document.querySelectorAll('.drop-zone')).find(z => z.dataset.name === targetGroupName);
                if (targetZone) targetZone.appendChild(div);
            });
            setupSortable();
        }

        function setupSortable() {
            document.querySelectorAll('.drop-zone').forEach(zone => {
                new Sortable(zone, {
                    group: 'machines',
                    animation: 150,
                    ghostClass: 'ghost',
                    onEnd: function (evt) {
                        saveOrderToSheet(evt.to);
                        if (evt.from !== evt.to) saveOrderToSheet(evt.from);
                    }
                });
            });
        }

        async function saveOrderToSheet(zoneElement) {
            const groupName = zoneElement.dataset.name;
            const blocks = Array.from(zoneElement.children);
            const updates = blocks.map((block, index) => ({
                rowIndex: block.dataset.rowindex,
                newGroupName: groupName,
                order: index + 1
            }));
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ updates: updates })
                });
            } catch (e) { console.error("Save Error", e); }
        }

        window.onload = loadData;
    </script>
</body>
</html>
