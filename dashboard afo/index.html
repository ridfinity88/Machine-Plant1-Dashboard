<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symmetry Machine Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --width-col-left: 1.0fr;
            --width-col-center: 1.2fr;
            --width-col-right: 0.6fr;
        }
        body { background: #000; color: #fff; margin: 0; overflow: hidden; font-family: sans-serif; }
        
        /* สไตล์หน้า Login */
        #loginPage {
            position: fixed; inset: 0; background: #000;
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .login-box {
            width: 320px; background: #0f172a; padding: 30px;
            border-radius: 16px; border: 1px solid #334155;
            display: flex; flex-direction: column; gap: 15px;
        }
        .input-group { position: relative; width: 100%; }
        .login-box input {
            width: 100%; height: 45px; background: #020617;
            border: 1px solid #334155; border-radius: 8px;
            color: #fff; padding: 0 40px 0 12px; outline: none;
        }
        .login-box input:focus { border-color: #3b82f6; }
        
        .eye-btn {
            position: absolute; right: 10px; top: 50%;
            transform: translateY(-50%); background: none;
            border: none; color: #94a3b8; cursor: pointer;
            font-size: 18px; line-height: 1;
        }
        
        .login-btn {
            width: 100%; height: 45px; background: #2563eb;
            color: #fff; border: none; border-radius: 8px;
            font-weight: bold; cursor: pointer;
        }
        .error-text { color: #f87171; font-size: 13px; text-align: center; display: none; }

        #dashboardPage { display: none; flex-direction: column; height: 100vh; }
        .dashboard-container {
            display: grid; grid-template-columns: var(--width-col-left) var(--width-col-center) var(--width-col-right);
            gap: 1rem; padding: 1rem; height: calc(100vh - 60px);
        }
        .card { background: #000; border: 1px solid #334155; border-radius: 12px; position: relative; }
        
        /* ตกแต่งตารางให้ดูเนียน */
        tr { transition: all 0.3s ease; }
        .val-upd { animation: pulse-blue 1s; }
        @keyframes pulse-blue {
            0% { background: rgba(59, 130, 246, 0); }
            50% { background: rgba(59, 130, 246, 0.2); }
            100% { background: rgba(59, 130, 246, 0); }
        }
    </style>
</head>
<body>

    <div id="loginPage">
        <div class="login-box">
            <h2 class="text-center text-blue-400 font-bold text-xl uppercase tracking-wider">System Access</h2>
            <div class="input-group">
                <input type="password" id="passInput" placeholder="รหัสผ่าน" onkeypress="handleEnter(event)">
                <button type="button" class="eye-btn" onclick="togglePass()">
                    <span id="eyeIcon">👁️</span>
                </button>
            </div>
            <button class="login-btn" onclick="checkLogin()">LOGIN</button>
            <p id="errorTxt" class="error-text">Incorrect Password</p>
        </div>
    </div>

    <div id="dashboardPage">
        <header class="flex justify-between items-center h-14 px-6 border-b border-slate-800">
            <h1 class="text-blue-400 font-bold tracking-tighter text-xl">MACHINE MONITORING SYSTEM</h1>
            <div id="clock" class="font-mono text-slate-400 text-lg">00:00:00</div>
        </header>

        <main class="dashboard-container">
            <div class="card p-4 overflow-hidden">
                <span class="text-[10px] text-slate-500 font-bold uppercase">⑤ Machine Real-time Data</span>
                <table class="w-full text-[12px] mt-4 border-collapse">
                    <thead class="text-blue-300 border-b border-slate-800">
                        <tr class="text-left">
                            <th class="pb-2">Name</th>
                            <th class="pb-2 text-center">Temp</th>
                            <th class="pb-2 text-center">Press</th>
                            <th class="pb-2 text-right">Status</th>
                        </tr>
                    </thead>
                    <tbody id="data-table">
                        </tbody>
                </table>
            </div>
            
            <div class="grid grid-rows-3 gap-4">
                <div class="card flex items-center justify-center p-2">
                    <span class="absolute top-2 left-2 text-[9px] text-slate-600">CENTER VIEW</span>
                    <img src="cen.png" class="max-h-[90%] object-contain">
                </div>
                <div class="card flex items-center justify-center p-2">
                    <span class="absolute top-2 left-2 text-[9px] text-slate-600">INLET SYSTEM</span>
                    <img src="in.png" class="max-h-[90%] object-contain">
                </div>
                <div class="card flex items-center justify-center p-2">
                    <span class="absolute top-2 left-2 text-[9px] text-slate-600">OUTLET SYSTEM</span>
                    <img src="out.png" class="max-h-[90%] object-contain">
                </div>
            </div>

            <div class="grid grid-rows-2 gap-4">
                <div class="card p-4 flex flex-col items-center justify-around">
                    <span class="absolute top-2 left-2 text-[9px] text-slate-600">EFFICIENCY RATIO</span>
                    <div class="relative">
                        <canvas id="p1" width="110" height="110"></canvas>
                        <div id="p1-label" class="absolute inset-0 flex items-center justify-center font-bold text-green-400 text-sm">--</div>
                    </div>
                    <div class="relative">
                        <canvas id="p2" width="110" height="110"></canvas>
                        <div id="p2-label" class="absolute inset-0 flex items-center justify-center font-bold text-blue-400 text-sm">--</div>
                    </div>
                </div>
                <div class="card p-4">
                    <span class="absolute top-2 left-2 text-[9px] text-slate-600">PRODUCTION TREND</span>
                    <div class="w-full h-full pt-4">
                        <canvas id="lineChart"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const MY_PASS = "1234";
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxYeA5b5d9MMrpWhi1K19O5fqn5jliHDMUg0aCHdIfzlGtCTEQB33BrqgCzImSamZX8Bg/exec";
        
        let chart1, chart2, trendChart;

        // --- ระบบ Login ---
        function checkLogin() {
            const input = document.getElementById('passInput');
            if (input.value === MY_PASS) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboardPage').style.display = 'flex';
                initCharts(); // สร้างกราฟรอไว้
                startDashboard();
            } else {
                document.getElementById('errorTxt').style.display = 'block';
                input.value = '';
                input.focus();
            }
        }

        function handleEnter(e) { if (e.key === 'Enter') checkLogin(); }

        function togglePass() {
            const input = document.getElementById('passInput');
            const icon = document.getElementById('eyeIcon');
            if (input.type === "password") {
                input.type = "text";
                icon.innerText = "🙈";
            } else {
                input.type = "password";
                icon.innerText = "👁️";
            }
        }

        // --- ระบบ Dashboard (ราบรื่น) ---
        function initCharts() {
            const commonOpt = { cutout: '80%', plugins: { legend: { display: false } }, responsive: true };
            
            chart1 = new Chart(document.getElementById('p1'), {
                type: 'doughnut',
                data: { datasets: [{ data: [0, 100], backgroundColor: ['#10b981', '#1e293b'], borderWidth: 0 }] },
                options: commonOpt
            });

            chart2 = new Chart(document.getElementById('p2'), {
                type: 'doughnut',
                data: { datasets: [{ data: [0, 100], backgroundColor: ['#3b82f6', '#1e293b'], borderWidth: 0 }] },
                options: commonOpt
            });

            trendChart = new Chart(document.getElementById('lineChart'), {
                type: 'line',
                data: {
                    labels: ['', '', '', '', ''],
                    datasets: [{
                        data: [0, 0, 0, 0, 0],
                        borderColor: '#3b82f6',
                        tension: 0.4,
                        pointRadius: 0,
                        borderWidth: 2
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { display: false }, y: { display: false } }
                }
            });
        }

        function startDashboard() {
            // นาฬิกาแบบเนียนๆ
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString();
            }, 1000);
            
            // ดึงข้อมูลครั้งแรกทันที
            fetchData();
            // ตั้งเวลาอัปเดตทุก 10 วินาที (10000ms) โดยไม่โหลดหน้าใหม่
            setInterval(fetchData, 10000);
        }

        async function fetchData() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                
                // 1. อัปเดตตาราง (Seamless Update)
                updateTable(data.table);
                
                // 2. อัปเดตกราฟ Pie (ตัวอย่างใช้ค่า temp จาก machine แรก)
                if (data.table && data.table.length > 0) {
                    const val1 = parseInt(data.table[0].temp) || 0;
                    const val2 = parseInt(data.table[1]?.temp) || 0;
                    
                    updatePie(chart1, 'p1-label', val1);
                    updatePie(chart2, 'p2-label', val2);
                    
                    // 3. อัปเดต Trend (เลื่อนกราฟเส้น)
                    updateTrend(val1);
                }

            } catch(e) {
                console.error("Fetch Error:", e);
            }
        }

        function updateTable(tableData) {
            const tbody = document.getElementById('data-table');
            let html = "";
            tableData.forEach(item => {
                const statusColor = item.status === 'Running' ? 'text-green-400' : 'text-amber-400';
                html += `
                <tr class="border-b border-slate-900 hover:bg-slate-900/50">
                    <td class="py-3 font-medium text-slate-400">${item.machine}</td>
                    <td class="text-center font-bold text-blue-400">${item.temp}°</td>
                    <td class="text-center font-bold text-emerald-400">${item.pressure}</td>
                    <td class="text-right font-bold ${statusColor}">${item.status}</td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        function updatePie(chart, labelId, value) {
            chart.data.datasets[0].data = [value, 100 - value];
            chart.update('none'); // อัปเดตแบบไม่มีแอนิเมชั่นซ้ำซ้อนเพื่อความสมูท
            document.getElementById(labelId).innerText = value + "%";
        }

        function updateTrend(newValue) {
            trendChart.data.datasets[0].data.push(newValue);
            trendChart.data.datasets[0].data.shift();
            trendChart.update();
        }

        window.onload = () => document.getElementById('passInput').focus();
    </script>
</body>
</html>
